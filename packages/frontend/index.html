<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>村里 — AI自己繁殖JRPGビレッジビルダー</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }
      body { background: #1a1a2e; color: #e0e0e0; font-family: "Hiragino Kaku Gothic ProN", "M PLUS 1p", sans-serif; }
      canvas { image-rendering: pixelated; image-rendering: crisp-edges; }
      :root {
        --bg-deep: #0d0d24;
        --bg-panel: #1a1a3e;
        --border: #4a6fa5;
        --accent-blue: #7ab8ff;
        --accent-purple: #d4a0ff;
        --text: #e8e8e8;
        --text-muted: #7a9ec7;
        --font: 'M PLUS 1p', 'Hiragino Kaku Gothic ProN', monospace;
      }
      button { transition: all 0.15s ease; }
      button:hover { filter: brightness(1.2); }
      button:active { transform: scale(0.97); }
      @keyframes fadeIn { from{opacity:0} to{opacity:1} }
      @keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
      @keyframes slideUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
      @keyframes glow { 0%,100%{box-shadow:0 0 4px rgba(122,184,255,0.4)} 50%{box-shadow:0 0 14px rgba(122,184,255,0.6)} }
      @keyframes titleGlow {
        0%, 100% { text-shadow: 0 0 20px rgba(122,184,255,0.3), 0 0 40px rgba(122,184,255,0.1); }
        50% { text-shadow: 0 0 30px rgba(122,184,255,0.5), 0 0 60px rgba(122,184,255,0.2), 0 0 80px rgba(122,184,255,0.08); }
      }
      @keyframes wizardSlideInRight {
        from { opacity: 0; transform: translateX(30px); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes wizardSlideInLeft {
        from { opacity: 0; transform: translateX(-30px); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes dotBounce {
        0%, 80%, 100% { transform: translateY(0); }
        40% { transform: translateY(-6px); }
      }
      @keyframes phaseTextIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes phaseTextOut {
        from { opacity: 1; transform: translateY(0); }
        to { opacity: 0; transform: translateY(-8px); }
      }
      ::-webkit-scrollbar{width:4px}
      ::-webkit-scrollbar-track{background:transparent}
      ::-webkit-scrollbar-thumb{background:#4a6fa5;border-radius:2px}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
