version: "3.8"

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3001}:3001"
    environment:
      - PORT=3001
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5176}
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      # Dojo on-chain bridge (optional)
      - DOJO_ENABLED=${DOJO_ENABLED:-false}
      - DOJO_RPC_URL=${DOJO_RPC_URL:-http://katana:5050}
    restart: unless-stopped
    depends_on:
      katana:
        condition: service_started
        required: false

  katana:
    image: ghcr.io/dojoengine/katana:v1.5.2
    command: --dev --dev.seed 0 --dev.no-fee --http.port 5050 --http.addr 0.0.0.0
    ports:
      - "5050:5050"
    profiles:
      - dojo

  torii:
    image: ghcr.io/dojoengine/torii:v1.5.2
    command: >
      --world ${DOJO_WORLD_ADDRESS:-0x0}
      --rpc http://katana:5050
      --http.port 8080
      --http.addr 0.0.0.0
    ports:
      - "8080:8080"
    depends_on:
      - katana
    profiles:
      - dojo
