version: "3.8"

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3001}:3001"
    environment:
      - PORT=3001
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Dojo (optional)
      - KATANA_RPC_URL=${KATANA_RPC_URL:-}
      - TORII_GRAPHQL_URL=${TORII_GRAPHQL_URL:-}
    restart: unless-stopped
    depends_on:
      katana:
        condition: service_started
        required: false

  katana:
    image: ghcr.io/dojoengine/katana:v1.5.2
    command: --dev --dev.seed 0 --dev.no-fee --http.port 5050 --http.addr 0.0.0.0
    ports:
      - "5050:5050"
    profiles:
      - dojo

  torii:
    image: ghcr.io/dojoengine/torii:v1.5.2
    command: >
      --world ${DOJO_WORLD_ADDRESS:-0x0}
      --rpc http://katana:5050
      --http.port 8080
      --http.addr 0.0.0.0
    ports:
      - "8080:8080"
    depends_on:
      - katana
    profiles:
      - dojo
